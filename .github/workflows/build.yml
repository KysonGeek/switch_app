name: Build

on:
  push:
    branches: [main]
    tags: ['v*']            # 推送 v* 标签会构建并发布 Release
  pull_request:
    branches: [main]
  workflow_dispatch:        # 允许在 Actions 页面手动触发

permissions:
  contents: write           # 创建 Release / 上传附件所需

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode (Swift 6 toolchain)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: swift --version

      - name: Build (release)
        run: swift build -c release

      - name: Package .app bundle
        # No signing certificate on CI → build_app.sh falls back to ad-hoc signing.
        run: bash ./build_app.sh

      - name: Zip the app bundle
        run: ditto -c -k --sequesterRsrc --keepParent "WindowSwitcher.app" WindowSwitcher.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: WindowSwitcher-app
          path: WindowSwitcher.zip
          if-no-files-found: error

      - name: Publish to GitHub Release
        # Only on tag pushes (e.g. v1.0.0): create/refresh the release and attach the zip.
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: WindowSwitcher.zip
          generate_release_notes: true
